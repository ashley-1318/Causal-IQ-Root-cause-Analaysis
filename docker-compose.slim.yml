version: "3.8"

# CausalIQ Slim Profile (8GB RAM Optimization)
# Disables monitoring-the-monitor and uses ultra-lightweight models.

services:
  # Use the 1.5GB model instead of the 8GB model
  ollama:
    entrypoint: /bin/sh -c "ollama serve & sleep 5 && ollama pull llama3.2:1b && wait"
    deploy:
      resources:
        limits:
          memory: 2.5G

  clickhouse:
    deploy:
      resources:
        limits:
          memory: 768M

  neo4j:
    environment:
      NEO4J_dbms_memory_heap_initial__size: "256m"
      NEO4J_dbms_memory_heap_max__size: "512m"
      NEO4J_dbms_memory_pagecache_size: "256m"
    deploy:
      resources:
        limits:
          memory: 1G

  redpanda:
    deploy:
      resources:
        limits:
          memory: 512M

  # Non-essential services for a core features demo are disabled
  prometheus: { scale: 0 }
  grafana: { scale: 0 }
  jaeger: { scale: 0 }
  otel-collector:
    # Use a simpler config that doesn't route to missing services
    command: ["--config=/etc/otel-collector-config-slim.yaml"]

  qdrant:
    deploy:
      resources:
        limits:
          memory: 512M
