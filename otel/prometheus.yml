global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: /metrics

  - job_name: causaliq-services
    static_configs:
      - targets:
          - 'auth-service:8000'
          - 'order-service:8001'
          - 'payment-service:8002'
    metrics_path: /metrics

  - job_name: causaliq-backend
    static_configs:
      - targets: ['backend:9000']
    metrics_path: /metrics

  - job_name: redpanda
    static_configs:
      - targets: ['redpanda:9644']
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: ['localhost:9100']
