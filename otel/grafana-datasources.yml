apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      timeInterval: 10s

  - name: Jaeger
    type: jaeger
    url: http://jaeger:16686
    access: proxy

  - name: ClickHouse
    type: grafana-clickhouse-datasource
    url: http://clickhouse:8123
    jsonData:
      defaultDatabase: causaliq
      username: default
    secureJsonData:
      password: causaliq123
